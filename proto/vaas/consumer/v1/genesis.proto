syntax = "proto3";

package vaas.consumer.v1;

option go_package = "github.com/allinbits/vaas/x/vaas/consumer/types";

import "vaas/v1/shared_consumer.proto";
import "ibc/lightclients/tendermint/v1/tendermint.proto";

import "gogoproto/gogo.proto";
import "vaas/v1/wire.proto";
import "google/protobuf/timestamp.proto";
import "tendermint/abci/types.proto";

// GenesisState defines the VAAS consumer genesis state
//
// Note: this type is only used on consumer side and references shared types
// with provider
message GenesisState {
  // ConsumerParams is a shared type with provider module
  vaas.v1.ConsumerParams params = 1 [ (gogoproto.nullable) = false ];
  // Client ID of the provider. This is the primary identifier for the provider.
  string provider_client_id = 2;
  // true for new chain, false for chain restart.
  bool new_chain = 3;
  // HeightToValsetUpdateId nil on new chain, filled in on restart.
  repeated HeightToValsetUpdateID height_to_valset_update_id = 4
      [ (gogoproto.nullable) = false ];
  // Flag indicating whether the consumer VAAS module starts in pre-VAAS state
  bool preVAAS = 5;
  vaas.v1.ProviderInfo provider = 6 [ (gogoproto.nullable) = false ];
  // LastVSCRecvTime is the block time of the last VSC packet the consumer
  // received; it drives IsVSCStale (safe mode). Round-tripped on restart so a
  // state-export upgrade preserves the staleness clock. Absent for a new chain
  // that has not received a VSC yet.
  google.protobuf.Timestamp last_vsc_recv_time = 7 [ (gogoproto.stdtime) = true ];

  // Missed-block bitmaps for validators currently tracked within the open
  // downtime window. Empty for a new chain or right after a window closes.
  repeated MissedBlockBitmapEntry missed_block_bitmaps = 8
      [ (gogoproto.nullable) = false ];

  // First height at which each currently-tracked validator was observed
  // within the open downtime window. Empty for a new chain or right after a
  // window closes.
  repeated FirstTrackedHeightEntry first_tracked_heights = 9
      [ (gogoproto.nullable) = false ];

  // Downtime params staged to take effect at the next window boundary.
  // Absent means nothing is staged.
  vaas.v1.DowntimeParams staged_downtime_params = 10;

  // Downtime evidence packets queued for send to the provider. Round-tripped
  // on restart because closing a window clears the source bitmaps, leaving
  // the queue as the only remaining copy of the evidence. Empty for a new
  // chain or when nothing is queued.
  repeated PendingEvidencePacketEntry pending_evidence_packets = 12
      [ (gogoproto.nullable) = false ];
}

// HeightValsetUpdateID represents a mapping internal to the consumer VAAS module
// which links a block height to each recv valset update id.
message HeightToValsetUpdateID {
  uint64 height = 1;
  uint64 valset_update_id = 2;
}

// MissedBlockBitmapEntry is a single validator's missed-block bitmap for the
// downtime window currently in progress.
message MissedBlockBitmapEntry {
  bytes addr = 1;
  bytes bitmap = 2;
}

// FirstTrackedHeightEntry is the first height at which a validator was
// observed within the downtime window currently in progress.
message FirstTrackedHeightEntry {
  bytes addr = 1;
  int64 height = 2;
}

// PendingEvidencePacketEntry is a single validator's queued downtime evidence
// packet: the validator's consensus address (the store key) and the
// JSON-encoded EvidencePacketData exactly as held by the consumer keeper's
// PendingEvidencePackets collection.
message PendingEvidencePacketEntry {
  bytes addr = 1;
  bytes packet = 2;
}
