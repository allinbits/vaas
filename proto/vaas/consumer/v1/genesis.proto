syntax = "proto3";

package vaas.consumer.v1;

option go_package = "github.com/allinbits/vaas/x/vaas/consumer/types";

import "vaas/v1/shared_consumer.proto";
import "ibc/lightclients/tendermint/v1/tendermint.proto";

import "gogoproto/gogo.proto";
import "vaas/v1/wire.proto";
import "google/protobuf/timestamp.proto";
import "tendermint/abci/types.proto";

// GenesisState defines the VAAS consumer genesis state
//
// Note: this type is only used on consumer side and references shared types
// with provider
message GenesisState {
  // ConsumerParams is a shared type with provider module
  vaas.v1.ConsumerParams params = 1 [ (gogoproto.nullable) = false ];
  // Client ID of the provider. This is the primary identifier for the provider.
  string provider_client_id = 2;
  // true for new chain, false for chain restart.
  bool new_chain = 4;
  // HeightToValsetUpdateId nil on new chain, filled in on restart.
  repeated HeightToValsetUpdateID height_to_valset_update_id = 5
      [ (gogoproto.nullable) = false ];
  // Flag indicating whether the consumer VAAS module starts in pre-VAAS state
  bool preVAAS = 9;
  vaas.v1.ProviderInfo provider = 10 [ (gogoproto.nullable) = false ];
}

// HeightValsetUpdateID represents a mapping internal to the consumer VAAS module
// which links a block height to each recv valset update id.
message HeightToValsetUpdateID {
  uint64 height = 1;
  uint64 valset_update_id = 2;
}
